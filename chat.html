<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat de Recetas</title>

        
 
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ffffff;
   
  color: rgb(28, 28, 28);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

        .volver{
  display:inline-block;
  margin-top:20px;
  text-decoration:none;
  color:#333;
  font-weight:bold;
}
        
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
 background-image: linear-gradient(rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.5)), url('../img/Novas.png');
background-size: cover;       /* Ajusta la imagen para llenar la caja */
background-position: center;  /* Centra la imagen */
background-repeat: no-repeat;
}

.mensaje {
  max-width: 70%;
  padding: 10px 15px;
  margin: 5px 0;
  border-radius: 15px;
}

.usuario {
  align-self: flex-end;
  background: #fff48e;
}

.ia {
  align-self: flex-start;
  background: #ffad3b;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: #fffbea;
}

#input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #ffd82b;
  color: white;
  cursor: pointer;
}
</style>
        
</head>
<a class="volver" href="../dashboard.php">
← Volver al dashboard
</a>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Pide una receta...">
   <button onclick="guardarReceta()"> Guardar receta</button>
  <button onclick="enviar()">Enviar</button>
        
</div>

<script>
const chat = document.getElementById("chat");

function agregarMensaje(texto, tipo) {
  const div = document.createElement("div");
  div.className = "mensaje " + tipo;
  div.innerText = texto;
  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}
        
 async function guardarReceta() {
  const mensajesIA = document.querySelectorAll(".ia");

  if (mensajesIA.length === 0) {
    alert("No hay receta para guardar");
    return;
  }

  const ultimaReceta = mensajesIA[mensajesIA.length - 1].innerText;

  const res = await fetch("guardar_receta.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      contenido: ultimaReceta
    }),
  });

  const data = await res.json();

  if (data.success) {
    alert("Receta guardada ✅");
  } else {
    alert("Error al guardar ❌");
  }
}       
 
        

async function enviar() {
  const input = document.getElementById("input");
  const mensaje = input.value;

  if (!mensaje) return;

  agregarMensaje(mensaje, "usuario");
  input.value = "";

  const res = await fetch("https://chefprueba.onrender.com/preguntar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ mensaje }),
  });

  const data = await res.json();

  agregarMensaje(data.respuesta, "ia");
}
</script>

</body>
</html>
